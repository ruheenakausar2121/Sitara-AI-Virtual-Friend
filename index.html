<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitara - Your AI Friend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
    .container { display: flex; height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #4c1d95 50%, #1e3a8a 100%); }
    .avatar-section { width: 50%; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); border-right: 1px solid rgba(168, 85, 247, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .title-section { position: absolute; top: 30px; left: 30px; z-index: 10; }
    .title-section h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .title-section p { font-size: 12px; color: rgba(168, 85, 247, 0.6); margin-top: 4px; letter-spacing: 1px; }
    #avatar-frame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    .status-badge { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; background: rgba(15, 23, 42, 0.8); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(168, 85, 247, 0.3); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
    .status-text { color: #94a3b8; font-size: 12px; }
    #listening-indicator { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #dc2626; color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; animation: pulse 1s infinite; z-index: 20; white-space: nowrap; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .chat-section { width: 50%; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); }
    .messages-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .message { display: flex; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }
    .message-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 14px; word-wrap: break-word; }
    .message.user .message-bubble { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: white; }
    .message.ai .message-bubble { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: #e2e8f0; border: 1px solid rgba(168, 85, 247, 0.2); }
    .input-section { padding: 20px 24px; border-top: 1px solid rgba(168, 85, 247, 0.2); background: rgba(15, 23, 42, 0.8); display: flex; align-items: center; gap: 12px; }
    .mic-button { width: 44px; height: 44px; border: none; border-radius: 50%; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease; }
    .mic-button:hover { transform: scale(1.05); }
    .input-wrapper { flex: 1; display: flex; align-items: center; background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 24px; padding: 10px 16px; transition: all 0.3s ease; }
    .input-wrapper:focus-within { border-color: rgba(168, 85, 247, 0.6); box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
    .text-input { flex: 1; background: transparent; border: none; color: #e2e8f0; font-size: 14px; outline: none; font-family: inherit; }
    .text-input::placeholder { color: rgba(148, 163, 184, 0.5); }
    .send-button { width: 44px; height: 44px; border: none; border-radius: 50%; background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease; }
    .send-button:hover { transform: scale(1.05); }
    .messages-container::-webkit-scrollbar { width: 6px; }
    .messages-container::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Avatar Section -->
    <div class="avatar-section">
      <div class="title-section">
        <h1>Sitara</h1>
        <p>Your AI Friend</p>
      </div>
      <div id="listening-indicator">🔴 Listening... speak now!</div>
      <iframe id="avatar-frame" src="avatar.html" allow="camera; microphone"></iframe>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
      <div class="messages-container" id="messagesContainer">
        <div class="message ai">
          <div class="message-bubble">Hey there! I am Sitara, your AI friend. How can I help you today? 😊</div>
        </div>
      </div>
      <div class="input-section">
        <button class="mic-button" id="mic-btn">🎤</button>
        <div class="input-wrapper">
          <input type="text" class="text-input" id="user-input" placeholder="Type a message to Sitara..." />
        </div>
        <button class="send-button" id="send-btn">➤</button>
      </div>
    </div>

  </div>

  <script>
    const input = document.getElementById('user-input')
    const messagesContainer = document.getElementById('messagesContainer')
    const sendBtn = document.getElementById('send-btn')
    const micBtn = document.getElementById('mic-btn')
    const listeningIndicator = document.getElementById('listening-indicator')
    let isListening = false

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text)
      utterance.rate = 0.95
      utterance.pitch = 1.1
      utterance.volume = 1
      const voices = window.speechSynthesis.getVoices()
      const preferred = voices.find(v => v.name.includes('Zira') || v.name.includes('Female') || v.lang === 'en-US')
      if (preferred) utterance.voice = preferred
      utterance.onstart = () => {
        const frame = document.getElementById('avatar-frame')
        if (frame && frame.contentWindow) frame.contentWindow.startTalking()
      }
      utterance.onend = () => {
        const frame = document.getElementById('avatar-frame')
        if (frame && frame.contentWindow) frame.contentWindow.stopTalking()
      }
      window.speechSynthesis.speak(utterance)
    }

    function addMessage(text, sender) {
      const messageDiv = document.createElement('div')
      messageDiv.className = `message ${sender}`
      const bubble = document.createElement('div')
      bubble.className = 'message-bubble'
      bubble.textContent = text
      messageDiv.appendChild(bubble)
      messagesContainer.appendChild(messageDiv)
      messagesContainer.scrollTop = messagesContainer.scrollHeight
    }

    function triggerAnimation(userMsg) {
      const frame = document.getElementById('avatar-frame')
      if (!frame || !frame.contentWindow) return
      const msg = userMsg.toLowerCase()
      if (msg.includes('dance')) {
        frame.contentWindow.playAnimation('dance')
        setTimeout(() => frame.contentWindow.stopAnimation(), 8000)
      } else if (msg.includes('walk')) {
        frame.contentWindow.playAnimation('walk')
        setTimeout(() => frame.contentWindow.stopAnimation(), 8000)
      } else if (msg.includes('wave')) {
        frame.contentWindow.playAnimation('wave')
        setTimeout(() => frame.contentWindow.stopAnimation(), 5000)
      } else if (msg.includes('stop')) {
        frame.contentWindow.stopAnimation()
      }
    }

    async function askSitara(transcript) {
      addMessage(transcript, 'user')
      addMessage('⏳ Sitara is thinking...', 'ai')
      triggerAnimation(transcript)
      try {
        const response = await fetch('http://localhost:11434/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'llama3',
            messages: [
              {
                role: 'system',
                content: `You are a friendly, calm and smart AI friend.
                Your name is Sitara. You are warm, supportive and helpful.
                Keep responses short and conversational like a real friend.
                Never be too formal. Always be kind and encouraging.`
              },
              { role: 'user', content: transcript }
            ],
            stream: false
          })
        })
        const data = await response.json()
        const lastMsg = messagesContainer.lastElementChild
        lastMsg.querySelector('.message-bubble').textContent = data.message.content
        speak(data.message.content)
      } catch {
        const lastMsg = messagesContainer.lastElementChild
        lastMsg.querySelector('.message-bubble').textContent = 'Sorry, make sure Ollama is running! 🤖'
      }
    }

    micBtn.addEventListener('click', async () => {
      if (isListening) return
      isListening = true
      micBtn.textContent = '🔴'
      micBtn.style.background = 'linear-gradient(135deg, #dc2626, #b91c1c)'
      listeningIndicator.style.display = 'block'

      try {
        const response = await fetch('http://localhost:5001/listen', { method: 'POST' })
        const data = await response.json()
        const transcript = data.text.trim()
        if (transcript) {
          listeningIndicator.style.display = 'none'
          await askSitara(transcript)
        } else {
          listeningIndicator.textContent = '❌ Could not hear, try again!'
          setTimeout(() => { listeningIndicator.style.display = 'none' }, 2000)
        }
      } catch {
        listeningIndicator.textContent = '❌ Is stt_server.py running?'
        setTimeout(() => { listeningIndicator.style.display = 'none' }, 2000)
      }

      isListening = false
      micBtn.textContent = '🎤'
      micBtn.style.background = 'linear-gradient(135deg, #3b82f6, #2563eb)'
    })

    sendBtn.addEventListener('click', async () => {
      const text = input.value.trim()
      if (!text) return
      input.value = ''
      await askSitara(text)
    })

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click()
    })
  </script>
</body>
</html>
